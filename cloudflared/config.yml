# ─── Cloudflare Tunnel — Pequeños Pasos ───────────────────────────────────────
#
# Este archivo se copia a:
#   Windows: C:\Users\<usuario>\.cloudflared\config.yml
#
# Pasos previos (una sola vez):
#   1. cloudflared tunnel login
#   2. cloudflared tunnel create pequenos-pasos
#   3. Copiar el UUID que aparece → reemplazar <TUNNEL_UUID> abajo
#   4. En Cloudflare dashboard: DNS → agregar CNAME:
#        registro.<tudominio.com>  →  <TUNNEL_UUID>.cfargotunnel.com
#      (o usar: cloudflared tunnel route dns pequenos-pasos registro.<tudominio.com>)
#   5. Copiar este archivo a C:\Users\<usuario>\.cloudflared\config.yml
#   6. Instalar como servicio: cloudflared service install
#
# Para verificar el túnel manualmente antes de instalar el servicio:
#   cloudflared tunnel --config cloudflared\config.yml run
# ──────────────────────────────────────────────────────────────────────────────

tunnel: <TUNNEL_UUID>
credentials-file: C:\Users\<USUARIO>\.cloudflared\<TUNNEL_UUID>.json

ingress:
  # PWA — la app que usan los promotores en el celular.
  - hostname: registro.<TUDOMINIO.COM>
    service: http://localhost:3000

  # n8n recibe webhooks SOLO desde app-pwa (red Docker interna) — no necesita túnel.
  # El editor es accesible desde la sede en http://localhost:5678.
  # Si en el futuro necesitás acceso remoto al editor, descomentá las dos líneas
  # de abajo, agregá el CNAME en Cloudflare DNS y reiniciá cloudflared.
  #- hostname: n8n.<TUDOMINIO.COM>
  #  service: http://localhost:5678

  # Regla por defecto: rechazar todo lo que no coincida con los hostnames.
  - service: http_status:404

# ─── Nota: subdominios con prefijo "www" (decisión: NO soportados) ─────────────
#
# Caso: pequenospasos.estoyai.com funciona, pero www.pequenospasos.estoyai.com no.
#
# La APP ya lo resolvería: tenantForHost() / subdomainOf() en
# app-pwa/src/lib/tenants/config.ts toma el ÚLTIMO label antes del dominio raíz,
# así que "www.pequenospasos" → tenant "pequenospasos". No hay que tocar código.
#
# Lo que falta es ENRUTAMIENTO + SSL, y ahí está el costo:
#   1. DNS: CNAME www.pequenospasos → <UUID>.cfargotunnel.com (proxied).
#   2. Public Hostname en el tunnel: www.pequenospasos.estoyai.com → localhost:3000.
#   3. SSL: el Universal SSL gratuito cubre estoyai.com y *.estoyai.com, pero NO
#      www.pequenospasos.estoyai.com (subdominio de DOS niveles; el wildcard solo
#      cubre uno). Requiere Advanced Certificate Manager (pago, ~US$10/mes).
#
# Ojo: un redirect 301 www→sin-www NO evita el problema de SSL. El handshake TLS
# ocurre ANTES del redirect, así que sin cert válido el https://www... falla
# antes de poder redirigir.
#
# DECISIÓN (jun 2026): no se soporta el prefijo www en subdominios de ONG. No se
# agrega DNS, ni Public Hostname, ni Redirect Rule, ni ACM. Compartir siempre la
# URL canónica SIN www: https://pequenospasos.estoyai.com
# ──────────────────────────────────────────────────────────────────────────────
