# ─── Pequeños Pasos — sede stack (PRODUCCIÓN / instalador) ────────────────────
# Este compose usa imágenes PRE-CONSTRUIDAS publicadas en GHCR — NO buildea en
# la PC del cliente. Para regenerar y publicar las imágenes (desde el repo):
#   docker build -t ghcr.io/lautaro-temperini/pp-app-pwa:latest ./app-pwa
#   docker build --build-arg WHISPER_MODEL=medium \
#        -t ghcr.io/lautaro-temperini/pp-whisper:latest ./services/whisper
#   docker push ghcr.io/lautaro-temperini/pp-app-pwa:latest
#   docker push ghcr.io/lautaro-temperini/pp-whisper:latest
#
#   Primer arranque:  docker compose up -d   (baja imágenes + modelo gemma3:4b)
#   Arranques diarios: docker compose up -d
# SQLite vive en el volumen "data" (data/sqlite/informes.db) — no es un contenedor.
# ──────────────────────────────────────────────────────────────────────────────

services:

  # ── PWA / API ──────────────────────────────────────────────────────────────
  app-pwa:
    image: ghcr.io/lautaro-temperini/pp-app-pwa:latest
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      # Next standalone usa HOSTNAME como bind address; Docker la pisa con el id
      # del contenedor y el server rechaza loopback (rompe el healthcheck).
      - HOSTNAME=0.0.0.0
      - DATA_DIR=/data
      - SITE_PASSWORD=${SITE_PASSWORD:-}
      # Multi-tenant: subdominio → ONG (ver MULTITENANT.md en el repo).
      - ROOT_DOMAIN=${ROOT_DOMAIN:-estoyai.com}
      - TENANT_PEQUENOSPASOS_PASSWORD=${TENANT_PEQUENOSPASOS_PASSWORD:-}
      - N8N_WEBHOOK_URL=${N8N_WEBHOOK_URL:-http://n8n:5678/webhook/registro}
      - N8N_R2_WEBHOOK_URL=${N8N_R2_WEBHOOK_URL:-}
      - N8N_PODIO_WEBHOOK_URL=${N8N_PODIO_WEBHOOK_URL:-}
      - NEXT_PUBLIC_ASR_LANG=${NEXT_PUBLIC_ASR_LANG:-es}
    volumes:
      - data:/data
    networks:
      - sede-net
    healthcheck:
      # manifest.webmanifest esta excluido del Basic Auth (ver middleware.ts) —
      # contra "/" el check daria 401 con SITE_PASSWORD seteado.
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:3000/manifest.webmanifest"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3

  # ── Orquestador n8n ────────────────────────────────────────────────────────
  n8n:
    image: docker.n8n.io/n8nio/n8n:2.8.4
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      # NOTA: n8n 2.x NO usa basic auth (removido desde n8n 1.0). El login del
      # editor es la "cuenta de propietario" (email + password) que se crea en
      # la UI en el primer arranque y queda guardada en el volumen n8n_data.
      # Los valores N8N_USER / N8N_PASSWORD del .env son solo referencia de esa
      # cuenta. La autenticación de la API REST usa N8N_API_KEY (header).
      # URLs internas de los servicios (deben coincidir con los nombres de servicio).
      - APP_URL=${APP_URL:-http://app-pwa:3000}
      - WHISPER_URL=${WHISPER_URL:-http://whisper:8000}
      - OLLAMA_URL=${OLLAMA_URL:-http://ollama:11434}
      # Elegido por primera-vez.bat segun RAM/CPU de la PC (ver .env junto a este archivo)
      - OLLAMA_MODEL=${OLLAMA_MODEL:-gemma3:4b}
      # n8n internals
      - N8N_HOST=0.0.0.0
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - EXECUTIONS_DATA_PRUNE=true
      - EXECUTIONS_DATA_MAX_AGE=336
      # En PCs modestas, dos transcripciones en paralelo ahogan la CPU: en serie.
      - N8N_CONCURRENCY_PRODUCTION_LIMIT=1
      - GENERIC_TIMEZONE=America/Argentina/Buenos_Aires
      - N8N_BLOCK_ENV_ACCESS_IN_NODE=false
      # El Code node de subir-r2 firma SigV4 (crypto) y sube con http/https crudos.
      - NODE_FUNCTION_ALLOW_BUILTIN=crypto,http,https
      # R2: el workflow subir-r2 lee estas envs (firma S3 a mano, sin credencial n8n).
      - CF_ACCOUNT_ID=${CF_ACCOUNT_ID:-}
      - CF_R2_ACCESS_KEY_ID=${CF_R2_ACCESS_KEY_ID:-}
      - CF_R2_SECRET_ACCESS_KEY=${CF_R2_SECRET_ACCESS_KEY:-}
      - CF_R2_BUCKET=${CF_R2_BUCKET:-}
    volumes:
      - n8n_data:/home/node/.n8n
      # Workflow pre-cargado al iniciar n8n (lectura única en primer arranque).
      - ./n8n/workflows:/home/node/workflows:ro
    networks:
      - sede-net
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:5678/healthz || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3

  # ── LLM local (Ollama) ─────────────────────────────────────────────────────
  # Solo interno — no expone puerto al host. El modelo gemma3:4b lo baja
  # automáticamente primera-vez.bat / 2-iniciar-sistema.bat en el primer arranque.
  # Fallback CPU lento: docker compose exec ollama ollama pull gemma3:1b
  ollama:
    image: ollama/ollama:0.30.5
    restart: unless-stopped
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - sede-net
    environment:
      # En PCs con poca RAM conviene 5m: libera el modelo cuando no se usa.
      - OLLAMA_KEEP_ALIVE=${OLLAMA_KEEP_ALIVE:-24h}
    healthcheck:
      # La imagen de ollama no trae wget; "ollama ps" habla con el server local.
      test: ["CMD", "ollama", "ps"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3

  # ── Transcripción de audio (faster-whisper) ────────────────────────────────
  # Solo interno — no expone puerto al host.
  # El modelo se pre-descarga en el build de la imagen (ver services/whisper/Dockerfile).
  whisper:
    image: ghcr.io/lautaro-temperini/pp-whisper:latest
    restart: unless-stopped
    environment:
      # "medium" viene horneado en la imagen; otros (small/base) se descargan al
      # primer arranque y quedan en el volumen whisper_cache.
      - WHISPER_MODEL=${WHISPER_MODEL:-medium}
      - WHISPER_LANGUAGE=${WHISPER_LANGUAGE:-es}
      - DATA_DIR=/data
    volumes:
      - data:/data
      - whisper_cache:/root/.cache
    networks:
      - sede-net
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"]
      interval: 30s
      timeout: 10s
      start_period: 120s
      retries: 3

# ── Volúmenes ──────────────────────────────────────────────────────────────────
# "data" es compartido entre app-pwa y whisper (audio/, docx/, sqlite/).
# Usar bind-mount en vez de named volume para acceso directo desde Windows:
#   volumes:
#     data:
#       driver: local
#       driver_opts:
#         type: none
#         o: bind
#         device: C:\PequenhosPasos\data
volumes:
  data:
  n8n_data:
  ollama_data:
  whisper_cache:

# ── Red interna ────────────────────────────────────────────────────────────────
networks:
  sede-net:
    driver: bridge
